apply plugin: 'com.android.application'

android {
    namespace 'com.cockroach.dance'
    compileSdk 34

    defaultConfig {
        applicationId 'com.cockroach.dance'
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName '1.0'
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
}
